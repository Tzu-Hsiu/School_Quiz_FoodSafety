<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外食稽查員認證</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c18;
    --panel: rgba(12, 18, 38, 0.96);
    --panel-2: rgba(20, 30, 55, 0.92);
    --line: rgba(0, 220, 255, 0.12);
    --text: #e0e8ff;
    --muted: #7a8aaa;
    --cyan: #00e5ff;
    --magenta: #e040fb;
    --purple: #b388ff;
    --purple-deep: #7c4dff;
    --gold: #ffd740;
    --green: #00e676;
    --red: #ff1744;
    --blue: #448aff;
    --neon-cyan: 0 0 8px rgba(0,229,255,0.6), 0 0 20px rgba(0,229,255,0.15);
    --neon-magenta: 0 0 8px rgba(224,64,251,0.6), 0 0 20px rgba(224,64,251,0.15);
    --neon-gold: 0 0 8px rgba(255,215,64,0.6), 0 0 20px rgba(255,215,64,0.15);
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    font-size: 17px;
    line-height: 1.7;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.015) 2px, rgba(0,229,255,0.015) 4px),
      radial-gradient(ellipse at 30% 0%, rgba(0,229,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 100%, rgba(224,64,251,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }
  button, input { font: inherit; color: inherit; }
  .hidden { display: none !important; }
  .screen {
    min-height: 100vh;
    padding: 24px 20px 56px;
    animation: screenSlide 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes screenSlide {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes screenShake {
    0%, 100% { transform: translateX(0); }
    10%, 50%, 90% { transform: translateX(-5px) rotate(-0.3deg); }
    30%, 70% { transform: translateX(5px) rotate(0.3deg); }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: var(--neon-cyan); }
    50% { box-shadow: 0 0 15px rgba(0,229,255,0.8), 0 0 30px rgba(0,229,255,0.3); }
  }
  @keyframes scoreFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    60% { opacity: 1; transform: translateY(-40px) scale(1.1); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
  }
  @keyframes dramaticZoom {
    0% { transform: scale(0.3) rotate(-2deg); opacity: 0; filter: blur(8px); }
    25% { transform: scale(1.15) rotate(0.5deg); opacity: 1; filter: blur(0); }
    60% { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 0; }
  }
  @keyframes redFlash {
    0% { opacity: 0.6; }
    100% { opacity: 0; }
  }
  @keyframes xpGlow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
  }
  @keyframes borderScan {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }
  @keyframes btnPress {
    0% { transform: scale(1); }
    40% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }
  @keyframes typewriter {
    from { max-height: 0; opacity: 0; }
    to { max-height: 200px; opacity: 1; }
  }
  .shake { animation: screenShake 0.45s ease !important; }
  .container { max-width: 960px; margin: 0 auto; }
  .top-nav, .status-bar, .panel, .card, .choice, .inspect-tile, .label-card, .restaurant-card, .mission-card, .exam-option, .certificate {
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
  }
  .top-nav, .status-bar, .panel, .card, .certificate {
    background: var(--panel);
    backdrop-filter: blur(12px);
    border-radius: 14px;
  }
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    margin-bottom: 8px;
    border-image: linear-gradient(90deg, var(--cyan), var(--magenta), var(--cyan)) 1;
    border-width: 0 0 2px 0;
    border-style: solid;
    border-radius: 14px 14px 0 0;
  }
  .brand { display: flex; gap: 12px; align-items: center; }
  .brand-mark {
    width: 46px; height: 46px;
    border-radius: 14px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, var(--cyan), var(--magenta));
    font-size: 24px;
    box-shadow: var(--neon-cyan);
    animation: glowPulse 3s ease infinite;
  }
  .brand-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--cyan);
    text-shadow: var(--neon-cyan);
  }
  .brand-sub { color: var(--muted); font-size: 13px; font-family: monospace; }
  .xp-container {
    padding: 8px 16px 10px;
    margin-bottom: 14px;
    background: rgba(0,229,255,0.03);
    border: 1px solid rgba(0,229,255,0.08);
    border-radius: 12px;
  }
  .xp-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 12px;
    font-family: 'Orbitron', monospace;
  }
  .xp-rank { color: var(--gold); font-weight: 700; text-shadow: var(--neon-gold); }
  .xp-points { color: var(--cyan); }
  .xp-next { color: var(--muted); font-family: "Noto Sans TC", sans-serif; }
  .xp-track {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(0,229,255,0.1);
  }
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--gold));
    background-size: 200% 100%;
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    animation: borderScan 3s linear infinite, xpGlow 2s ease infinite;
  }
  .btn {
    min-height: 48px;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
  .btn:active { animation: btnPress 0.2s ease; }
  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--purple-deep));
    color: #fff;
    box-shadow: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #ff9100);
    color: #1a1a2e;
    box-shadow: var(--neon-gold);
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(0,229,255,0.3);
  }
  .btn-secondary:hover { border-color: var(--cyan); box-shadow: var(--neon-cyan); }
  .btn-green {
    background: linear-gradient(135deg, var(--green), #00c853);
    color: #0a1a0e;
    box-shadow: 0 0 8px rgba(0,230,118,0.5);
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
  }
  .btn-red {
    background: linear-gradient(135deg, var(--red), #d50000);
    color: #fff;
    box-shadow: 0 0 8px rgba(255,23,68,0.5);
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; filter: none; box-shadow: none; }
  .hero {
    display: grid;
    grid-template-columns: 1.15fr .85fr;
    gap: 18px;
    align-items: stretch;
  }
  .panel {
    padding: 24px;
    border: 1px solid var(--line);
  }
  h1 {
    margin: 0 0 10px;
    font-family: 'Orbitron', monospace;
    font-size: clamp(26px, 4vw, 44px);
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--magenta) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px rgba(0,229,255,0.3));
  }
  .lead { color: var(--muted); font-size: 17px; line-height: 1.8; margin: 0 0 20px; }
  .hero-list, .brief-points, .feedback-list, .evidence-list { display: grid; gap: 10px; }
  .hero-item, .brief-item, .feedback-item, .evidence-item {
    background: rgba(0,229,255,0.03);
    border: 1px solid rgba(0,229,255,0.08);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 16px;
    line-height: 1.75;
    border-left: 3px solid var(--cyan);
  }
  .hero-item strong, .brief-item strong, .feedback-title, .evidence-item strong {
    color: var(--gold);
    text-shadow: var(--neon-gold);
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 18px;
  }
  .stat {
    background: linear-gradient(180deg, rgba(0,229,255,0.08), rgba(12,18,38,0.9));
    border: 1px solid rgba(0,229,255,0.12);
    border-radius: 16px;
    padding: 16px;
  }
  .stat-label { color: var(--muted); font-size: 13px; font-family: monospace; }
  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    margin-top: 8px;
    color: var(--cyan);
    text-shadow: var(--neon-cyan);
  }
  .section-title {
    margin: 0 0 14px;
    font-size: 20px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 1px;
  }
  .small { color: var(--muted); font-size: 14px; font-family: monospace; letter-spacing: 0.5px; }
  .name-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    margin-top: 18px;
  }
  .name-input {
    min-height: 50px;
    border-radius: 10px;
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.2);
    color: #fff;
    padding: 0 16px;
    font-size: 16px;
    transition: all 0.2s;
  }
  .name-input:focus {
    border-color: var(--cyan);
    box-shadow: var(--neon-cyan);
    outline: none;
  }
  .ranks {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
    margin-top: 18px;
  }
  .rank-chip {
    text-align: center;
    padding: 12px 8px;
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    color: var(--muted);
    font-size: 13px;
    transition: all 0.3s;
  }
  .rank-chip.active {
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(224,64,251,0.15));
    color: var(--cyan);
    border: 1px solid rgba(0,229,255,0.4);
    box-shadow: var(--neon-cyan);
    text-shadow: var(--neon-cyan);
  }
  .level-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
    margin-top: 20px;
  }
  .level-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    min-height: 170px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.3s;
  }
  .level-card.unlocked {
    border-color: rgba(0,229,255,0.3);
  }
  .level-card.unlocked:hover {
    border-color: var(--cyan);
    box-shadow: var(--neon-cyan);
    transform: translateY(-3px);
  }
  .level-card.locked { opacity: 0.3; filter: grayscale(0.5); }
  .level-card .icon { font-size: 34px; }
  .level-card h3 { margin: 10px 0 6px; font-size: 16px; font-family: 'Orbitron', monospace; }
  .level-card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.65; }
  .badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
  .badge {
    min-width: 120px;
    padding: 12px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--muted);
    text-align: center;
    font-size: 14px;
    transition: all 0.3s;
  }
  .badge.earned {
    color: #fff;
    background: linear-gradient(135deg, rgba(0,229,255,0.25), rgba(224,64,251,0.25));
    border-color: rgba(0,229,255,0.5);
    box-shadow: var(--neon-cyan);
    text-shadow: var(--neon-cyan);
  }
  .status-bar {
    display: grid;
    grid-template-columns: 1.3fr repeat(4, minmax(0, 1fr));
    gap: 12px;
    padding: 14px;
    margin-bottom: 14px;
    border: 1px solid var(--line);
  }
  .status-cell {
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(0,229,255,0.03);
    border: 1px solid rgba(0,229,255,0.06);
  }
  .status-label { color: var(--muted); font-size: 12px; font-family: monospace; letter-spacing: 1px; text-transform: uppercase; }
  .status-value {
    margin-top: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 800;
    color: var(--cyan);
    text-shadow: var(--neon-cyan);
  }
  .mission-title {
    margin: 0 0 8px;
    font-size: 22px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 2px;
    color: var(--gold);
    text-shadow: var(--neon-gold);
  }
  .mission-desc { color: var(--muted); font-size: 16px; line-height: 1.8; margin: 0; }
  .brief-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .question-card, .inspect-panel, .mission-panel, .certificate { padding: 24px; }
  .choice-grid, .exam-option-list { display: grid; gap: 12px; margin-top: 18px; }
  .choice, .exam-option {
    width: 100%;
    padding: 16px 20px;
    text-align: left;
    font-size: 16px;
    line-height: 1.7;
    background: rgba(0,229,255,0.03);
    border: 1px solid rgba(0,229,255,0.08);
    border-radius: 12px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .choice:hover, .exam-option:hover {
    background: rgba(0,229,255,0.1);
    border-color: rgba(0,229,255,0.3);
    box-shadow: var(--neon-cyan);
    transform: translateX(4px);
  }
  .choice.correct, .exam-option.correct {
    background: rgba(0,230,118,0.15);
    border-color: rgba(0,230,118,0.6);
    box-shadow: 0 0 12px rgba(0,230,118,0.3);
  }
  .choice.wrong, .exam-option.wrong {
    background: rgba(255,23,68,0.15);
    border-color: rgba(255,23,68,0.6);
    box-shadow: 0 0 12px rgba(255,23,68,0.3);
  }
  .feedback-card {
    margin-top: 16px;
    padding: 20px;
    background: rgba(0,229,255,0.03);
    border-radius: 12px;
    font-size: 16px;
    line-height: 1.75;
    animation: fadeIn 0.3s ease;
  }
  .feedback-card.good { border: 1px solid rgba(0,230,118,0.4); border-left: 4px solid var(--green); }
  .feedback-card.bad { border: 1px solid rgba(255,23,68,0.4); border-left: 4px solid var(--red); }
  .progress {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
  .inspect-layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: 16px; }
  .inspect-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
  .inspect-tile {
    min-height: 132px;
    border-radius: 18px;
    padding: 14px;
    background: rgba(0,229,255,0.02);
    border: 1px solid var(--line);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.25s;
  }
  .inspect-tile:hover {
    background: rgba(0,229,255,0.08);
    border-color: rgba(0,229,255,0.3);
    box-shadow: var(--neon-cyan);
    transform: translateY(-2px);
  }
  .inspect-tile.done {
    border-color: rgba(0,230,118,0.5);
    background: rgba(0,230,118,0.06);
  }
  .inspect-tile.safe { border-color: rgba(68,138,255,0.4); }
  .inspect-tag {
    align-self: flex-start;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-family: monospace;
    background: rgba(0,229,255,0.08);
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .fix-option {
    margin-top: 10px;
    width: 100%;
    padding: 14px 18px;
    border-radius: 10px;
    text-align: left;
    font-size: 16px;
    line-height: 1.7;
    background: rgba(0,229,255,0.03);
    color: var(--text);
    border: 1px solid rgba(0,229,255,0.08);
    cursor: pointer;
    transition: all 0.2s;
  }
  .fix-option:hover {
    background: rgba(0,229,255,0.1);
    border-color: rgba(0,229,255,0.3);
    transform: translateX(4px);
  }
  .label-layout { display: grid; grid-template-columns: 1fr .95fr; gap: 16px; }
  .label-card {
    background: rgba(0,229,255,0.02);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
  }
  .label-meta {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .label-box {
    background: rgba(0,0,0,0.3);
    border-radius: 14px;
    padding: 12px;
    min-height: 78px;
    border: 1px solid rgba(0,229,255,0.06);
  }
  .label-box strong { color: var(--gold); display: block; margin-bottom: 6px; font-size: 14px; font-family: monospace; }
  .judge-row { display: flex; gap: 12px; margin-top: 18px; }
  .restaurant-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
  .restaurant-card, .mission-card {
    background: rgba(0,229,255,0.02);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    transition: all 0.25s;
    cursor: pointer;
  }
  .restaurant-card:hover {
    border-color: rgba(0,229,255,0.3);
    transform: translateY(-2px);
  }
  .restaurant-card.selected {
    border-color: rgba(255,215,64,0.6);
    background: rgba(0,229,255,0.06);
    box-shadow: var(--neon-gold);
  }
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .pill {
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-family: monospace;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .pill.good { color: var(--green); border-color: rgba(0,230,118,0.2); }
  .pill.warn { color: var(--gold); border-color: rgba(255,215,64,0.2); }
  .pill.bad { color: var(--red); border-color: rgba(255,23,68,0.2); }
  .mission-layout { display: grid; grid-template-columns: 1.05fr .95fr; gap: 16px; }
  .news-flash {
    margin-top: 16px;
    padding: 16px 18px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255,23,68,0.08), rgba(224,64,251,0.08));
    border: 1px solid rgba(255,23,68,0.25);
    animation: glowPulse 2s ease infinite;
  }
  .exam-layout { display: grid; grid-template-columns: 1.05fr .95fr; gap: 16px; }
  .certificate {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px;
    background: linear-gradient(180deg, rgba(0,229,255,0.06), rgba(224,64,251,0.04)), var(--panel);
    border: 2px solid rgba(0,229,255,0.3);
    box-shadow: var(--neon-cyan), inset 0 0 60px rgba(0,229,255,0.03);
  }
  .certificate h2 {
    margin: 0;
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px, 4vw, 40px);
    text-align: center;

function getToday() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y} 年 ${m} 月 ${day} 日`;
}

function updateRank() {
  let current = rankList[0].name;
  for (const rank of rankList) {
    if (state.totalScore >= rank.min) current = rank.name;
  }
  state.rank = current;
}

function resetLevel(level) {
  state.totalScore -= state.levelScores[level];
  if (state.totalScore < 0) state.totalScore = 0;
  state.levelScores[level] = 0;
  updateRank();
}

function addScore(level, points) {
  state.levelScores[level] += points;
  state.totalScore += points;
  updateRank();
}

function awardBadge(id) {
  if (!state.badges.includes(id)) state.badges.push(id);
}

function goHome() {
  clearTimers();
  renderHome();
}

function clearTimers() {
  if (state.l3Timer) clearInterval(state.l3Timer);
  if (state.l5Timer) clearInterval(state.l5Timer);
  if (state.speedTimer) clearInterval(state.speedTimer);
  state.l3Timer = null;
  state.l5Timer = null;
  state.speedTimer = null;
}

function lockCheck(level) {
  return state.unlockedLevel >= level;
}

function getSpeedBonus() {
  if (!state.questionStartTime) return 0;
  const elapsed = (Date.now() - state.questionStartTime) / 1000;
  return Math.max(0, Math.floor(10 - elapsed));
}

function startSpeedTimer(containerId) {
  state.questionStartTime = Date.now();
  if (state.speedTimer) clearInterval(state.speedTimer);
  state.speedTimer = setInterval(() => {
    const el = document.getElementById(containerId);
    if (!el) { clearInterval(state.speedTimer); return; }
    const bonus = getSpeedBonus();
    el.textContent = bonus > 0 ? `+${bonus}` : "—";
    el.className = `speed-value ${bonus > 6 ? "high" : bonus > 3 ? "med" : bonus > 0 ? "low" : "zero"}`;
  }, 100);
}

function showScorePopup(base, bonus) {
  const popup = document.createElement("div");
  popup.className = "score-popup";
  popup.innerHTML = `<div class="score-base">+${base + bonus}</div>${bonus > 0 ? '<div class="score-speed">SPEED BONUS +' + bonus + '</div>' : ''}`;
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 2200);
}

function triggerShake() {
  const app = document.getElementById("app");
  app.classList.add("shake");
  setTimeout(() => app.classList.remove("shake"), 500);
}

function triggerRedFlash() {

  flash.className = "red-flash";
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);
}

function showDramaticText(text, type) {
  const overlay = document.createElement("div");

function renderXPBar() {

function startMission(level) {
  state.currentLevel = level;
  if (level === 1) {
    resetLevel(1);
    state.l1Index = 0;
    state.l1Answered = false;
    renderLevel1();
  }
  if (level === 2) {
    resetLevel(2);
    state.l2Found = [];
    state.l2Selected = null;
    state.l2Answered = false;
    renderLevel2();
  }
  if (level === 3) {
    resetLevel(3);
    state.l3Index = 0;
    state.l3Answered = false;
    state.l3TimeLeft = 75;
    renderLevel3();
    startL3Timer();
  }
  if (level === 4) {
    resetLevel(4);
    state.l4MissionIndex = 0;
    state.l4InvestigationsLeft = 3;
    state.l4SelectedRestaurant = null;
    state.l4Completed = [];
    state.l4PendingNews = missions[0].newsFlash;
    renderLevel4();
  }
  if (level === 5) {
    resetLevel(5);
    state.l5Index = 0;
    state.l5Answered = false;
    state.l5TimeLeft = 135;
    renderLevel5();
    startL5Timer();
  }
}

function completeLevel(level, passPoints, badgeId) {
  if (passPoints) addScore(level, passPoints);
  if (badgeId) awardBadge(badgeId);
  if (state.unlockedLevel === level && level < 5) state.unlockedLevel = level + 1;
  saveRecord();
}

function renderApp(html) {
  const app = document.getElementById("app");
  app.innerHTML = html.replace(/onclick="([^"]+)"/g, 'data-action="$1"');
}

function runAction(handler) {
  if (handler === "goHome()") return goHome();
  if (handler === "saveName()") return saveName();
  if (handler === "nextLevel1()") return nextLevel1();
  if (handler === "renderLevel2()") return renderLevel2();
  if (handler === "finishLevel2()") return finishLevel2();
  if (handler === "answerLevel3(true)") return answerLevel3(true);
  if (handler === "answerLevel3(false)") return answerLevel3(false);
  if (handler === "nextLevel3()") return nextLevel3();
  if (handler === "investigateRestaurant()") return investigateRestaurant();
  if (handler === "confirmRestaurant()") return confirmRestaurant();
  if (handler === "nextMission4()") return nextMission4();
  if (handler === "nextLevel5()") return nextLevel5();
  if (handler === "finishExam()") return finishExam();
  if (handler === "window.print()") return window.print();
  if (handler === "clearLeaderboard()") return clearLeaderboard();
  if (handler === "exportCSV()") return exportCSV();
  if (handler === "levelCompleteNext()") return window.levelCompleteNext && window.levelCompleteNext();

  let match = handler.match(/^startMission\((\d+)\)$/);
  if (match) return startMission(Number(match[1]));

  match = handler.match(/^answerLevel1\((\d+)\)$/);
  if (match) return answerLevel1(Number(match[1]));

  match = handler.match(/^selectInspectTile\('([^']+)'\)$/);
  if (match) return selectInspectTile(match[1]);

  match = handler.match(/^answerInspect\('([^']+)',\s*(\d+)\)$/);
  if (match) return answerInspect(match[1], Number(match[2]));

  match = handler.match(/^selectRestaurant\('([^']+)'\)$/);
  if (match) return selectRestaurant(match[1]);

  match = handler.match(/^answerLevel5\((\d+)\)$/);
  if (match) return answerLevel5(Number(match[1]));
}

function saveRecord() {
  if (!state.studentName || state.studentName === "匿名學員") return;
  const records = JSON.parse(localStorage.getItem("foodsafety_records") || "[]");
  const rec = {
    id: Date.now(), name: state.studentName, cls: state.studentClass || "未分班",
    score: state.totalScore, levelScores: {...state.levelScores},
    badges: [...state.badges], rank: state.rank, date: getToday()
  };
  const idx = records.findIndex(r => r.name === rec.name && r.cls === rec.cls);
  if (idx >= 0) { if (records[idx].score < rec.score) records[idx] = rec; }
  else records.push(rec);
  localStorage.setItem("foodsafety_records", JSON.stringify(records));
}

function loadRecords() {
  return JSON.parse(localStorage.getItem("foodsafety_records") || "[]");
}

function getClassRankings() {
  const records = loadRecords();
  const classes = {};
  records.forEach(r => {
    const c = r.cls || "未分班";
    if (!classes[c]) classes[c] = { scores: [], certified: 0 };
    classes[c].scores.push(r.score);
    if (r.score >= 340 || (r.badges && r.badges.includes("cert"))) classes[c].certified++;
  });
  return Object.entries(classes).map(([cls, d]) => ({
    cls, avg: Math.round(d.scores.reduce((a, b) => a + b, 0) / d.scores.length),
    count: d.scores.length, certified: d.certified, top: Math.max(...d.scores)
  })).sort((a, b) => b.avg - a.avg);
}

function renderLeaderboardHTML() {
  const records = loadRecords();
  if (records.length === 0) return '<div class="ranking-empty">NO DATA — COMPLETE MISSIONS TO REGISTER</div>';
  const classR = getClassRankings();
  const topAgents = [...records].sort((a, b) => b.score - a.score).slice(0, 10);
  const medals = ["🥇", "🥈", "🥉"];
  let classRows = classR.map((c, i) => `<tr><td>${medals[i] || (i+1)}</td><td><strong>${c.cls}</strong></td><td>${c.avg}</td><td>${c.certified}</td><td>${c.count}</td></tr>`).join("");
  let agentRows = topAgents.map((a, i) => `<tr><td>${medals[i] || (i+1)}</td><td>${a.name}</td><td>${a.cls}</td><td><strong>${a.score}</strong></td><td>${a.rank}</td></tr>`).join("");
  return `<div class="ranking-layout">
    <div>
      <h3 style="margin:0 0 10px; font-size:13px; font-family:Orbitron,monospace; color:var(--gold); letter-spacing:2px;">SQUAD RANKINGS</h3>

function exportCSV() {
  const records = loadRecords();
  if (records.length === 0) { alert("目前沒有任何紀錄。"); return; }
  let csv = "\uFEFF姓名,班級,總分,階級,L1,L2,L3,L4,L5,日期\n";
  records.forEach(r => {
    const ls = r.levelScores || {};
    csv += [r.name, r.cls, r.score, r.rank, ls[1]||0, ls[2]||0, ls[3]||0, ls[4]||0, ls[5]||0, r.date].join(",") + "\n";
  });
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "food_safety_records.csv";
  a.click();
}

            ${q.options.map((option, index) => '<button class="choice" id="l1-option-' + index + '" onclick="answerLevel1(' + index + ')">' + String.fromCharCode(65 + index) + "．" + option + "</button>").join("")}
          </div>
          <div class="progress"><div class="progress-fill" style="width:${progress}%;"></div></div>
          <div class="actions" id="l1-actions">
            ${state.l1Answered ? '<button class="btn btn-primary" onclick="nextLevel1()">' + (state.l1Index === level1Questions.length - 1 ? "MISSION COMPLETE" : "NEXT →") + "</button>" : ""}

          <div id="l1-feedback"></div>
        </div>
      </div>
    </section>
  `);

}

function answerLevel1(index) {
  if (state.l1Answered) return;
  state.l1Answered = true;
  if (state.speedTimer) clearInterval(state.speedTimer);
  const q = level1Questions[state.l1Index];
  const correct = index === q.answer;
  const base = 12;
  const bonus = correct ? getSpeedBonus() : 0;
  if (correct) addScore(1, base + bonus);
  document.querySelectorAll('[id^="l1-option-"]').forEach((el, i) => {
    if (i === q.answer) el.classList.add("correct");
    else if (i === index) el.classList.add("wrong");
    el.disabled = true;
  });
  if (!correct) { triggerShake(); triggerRedFlash(); showDramaticText("VIOLATION DETECTED", "fail"); }
  else { showScorePopup(base, bonus); showDramaticText("TARGET ACQUIRED", "success"); }
  const scoreHtml = correct ? '<div class="score-earned">+' + base + ' BASE' + (bonus > 0 ? ' <span class="speed-glow">+' + bonus + ' SPEED</span>' : '') + '</div>' : '';
  document.getElementById("l1-feedback").innerHTML = `
    <div class="feedback-card ${correct ? "good" : "bad"}">
      ${scoreHtml}
      <div class="feedback-title">${correct ? "✓ 判斷正確" : "✗ 判斷失誤"}</div>
      <p>${q.explanation}</p>
    </div>`;
  document.getElementById("l1-actions").innerHTML = '<button class="btn btn-primary" data-action="nextLevel1()">' + (state.l1Index === level1Questions.length - 1 ? "MISSION COMPLETE" : "NEXT →") + "</button>";
}

function nextLevel1() {
  if (state.l1Index < level1Questions.length - 1) {
    state.l1Index += 1;
    state.l1Answered = false;
    renderLevel1();
    return;
  }
  if (state.levelScores[1] >= 60) awardBadge("quiz");
  completeLevel(1, 10, null);
  showDramaticText("MISSION CLEARED", "clear");
  renderLevelComplete(1, "LEVEL 1 COMPLETE", "第一關完成。接下來進入餐廳現場稽查，巡檢各區域的衛生狀況。",
    [`本關得分：${state.levelScores[1]}`], "PROCEED TO LEVEL 2", () => startMission(2));
}

function renderLevel2() {
  const foundCount = state.l2Found.filter(id => inspectionTiles.find(t => t.id === id && t.issue)).length;
  const progress = (foundCount / inspectionTiles.filter(t => t.issue).length) * 100;

  renderApp(`
    <section class="screen">
      <div class="container">
        ${renderStatus("LEVEL 2 — 現場稽查", 2, `
          <div class="status-cell"><div class="status-label">FOUND</div><div class="status-value">${foundCount}/${inspectionTiles.filter(t => t.issue).length}</div></div>
          <div class="status-cell"><div class="status-label">PROGRESS</div><div class="status-value">${Math.round(progress)}%</div></div>
        `)}
        ${foundCount === 0 && !selected ? renderCommander(commanderLines[2]) : ""}
        <div class="inspect-layout">
          <div class="panel">
            <div class="inspect-grid">
              ${inspectionTiles.map(tile => {
                const done = state.l2Found.includes(tile.id);
                return '<button class="inspect-tile ' + (done ? "done" : "") + " " + (tile.issue ? "" : "safe") + '" onclick="selectInspectTile(\'' + tile.id + '\')">' +
                  '<div class="inspect-tag">' + tile.area + '</div>' +
                  '<div style="font-size:34px;">' + tile.icon + '</div>' +
                  '<div><div style="font-weight:800; margin-bottom:6px;">' + tile.title + '</div>' +
                  '<div class="small">' + (done ? "CLEARED" : "INSPECT") + '</div></div></button>';
              }).join("")}
            </div>

          </div>
          <div class="panel inspect-panel">
            ${selected ? renderInspectPanel(selected) : '<h3 class="section-title">AWAITING INSPECTION</h3><p class="mission-desc">選擇一個區域開始巡檢。</p>'}
            ${foundCount >= inspectionTiles.filter(t => t.issue).length ? '<div class="actions"><button class="btn btn-green" onclick="finishLevel2()">COMPLETE LEVEL 2</button></div>' : ""}

        </div>
      </div>
    </section>
  `);
  if (selected && !state.l2Found.includes(selected.id) && selected.issue) {
    startSpeedTimer("l2-speed");
  }
}

function renderInspectPanel(tile) {
  if (!tile.issue) {
    return '<h3 class="section-title">' + tile.title + '</h3><p class="mission-desc">' + tile.detail + '</p>' +
      '<div class="feedback-card good"><div class="feedback-title">✓ POSITIVE OBSERVATION</div><p>' + tile.explanation + '</p></div>';
  }
  const alreadyDone = state.l2Found.includes(tile.id);
  if (alreadyDone) {
    return '<h3 class="section-title">' + tile.title + '</h3><p class="mission-desc">' + tile.detail + '</p>' +
      '<div class="feedback-card good"><div class="feedback-title">✓ RESOLVED</div><p>' + tile.explanation + '</p></div>';
  }
  return '<h3 class="section-title">' + tile.title + '</h3><p class="mission-desc">' + tile.detail + '</p>' +
    renderSpeedZone("l2-speed") +
    '<div class="small" style="margin-top:14px;">選出最適合的改善措施：</div>' +
    tile.fixes.map((fix, index) => '<button class="fix-option" onclick="answerInspect(\'' + tile.id + '\', ' + index + ')">' + String.fromCharCode(65 + index) + "．" + fix + "</button>").join("");
}

function selectInspectTile(id) {
  state.l2Selected = id;
  const tile = inspectionTiles.find(t => t.id === id);
  if (tile && !tile.issue && tile.bonus && !state.l2Found.includes(id)) {
    addScore(2, tile.bonus);
    state.l2Found.push(id);
    showScorePopup(tile.bonus, 0);
  }
  renderLevel2();
}

function answerInspect(id, index) {
  const tile = inspectionTiles.find(t => t.id === id);
  if (!tile || state.l2Found.includes(id)) return;
  if (state.speedTimer) clearInterval(state.speedTimer);
  const correct = index === tile.answer;
  const base = 10;
  const bonus = correct ? getSpeedBonus() : 0;
  if (correct) {
    addScore(2, base + bonus);
    state.l2Found.push(id);
    showScorePopup(base, bonus);
    showDramaticText("ISSUE RESOLVED", "success");
  } else {
    triggerShake();
    triggerRedFlash();
    showDramaticText("INCORRECT FIX", "fail");
  }
  const panel = document.querySelector(".inspect-panel");
  const scoreHtml = correct ? '<div class="score-earned">+' + base + ' BASE' + (bonus > 0 ? ' <span class="speed-glow">+' + bonus + ' SPEED</span>' : '') + '</div>' : '';
  panel.innerHTML = '<h3 class="section-title">' + tile.title + '</h3><p class="mission-desc">' + tile.detail + '</p>' +
    '<div class="feedback-card ' + (correct ? "good" : "bad") + '">' + scoreHtml +
    '<div class="feedback-title">' + (correct ? "✓ 處置正確" : "✗ 處置失誤") + '</div><p>' + tile.explanation + '</p></div>' +
    '<div class="actions"><button class="btn btn-primary" onclick="renderLevel2()">BACK TO MAP</button></div>';
}

function finishLevel2() {
  if (state.levelScores[2] >= 70) awardBadge("inspect");
  completeLevel(2, 12, null);
  showDramaticText("MISSION CLEARED", "clear");
  renderLevelComplete(2, "LEVEL 2 COMPLETE", "餐廳巡檢完成。下一關是限時食品標示鑑定。",
    [`本關得分：${state.levelScores[2]}`], "PROCEED TO LEVEL 3", () => startMission(3));
}

function selectRestaurant(name) {
  state.l4SelectedRestaurant = name;
  state.questionStartTime = Date.now();
  renderLevel4();
}

function renderRestaurantPanel(r) {
  const mission = missions[state.l4MissionIndex];
  const revealedCount = state.l4Completed.filter(item => item.mission === state.l4MissionIndex && item.restaurant === r.name).length;
  return '<h3 class="section-title">' + r.name + '</h3><p class="mission-desc">' + r.safety + '</p>' +
    '<div class="evidence-list" style="margin-top:14px;">' +
    (r.reveals.slice(0, revealedCount).map(text => '<div class="evidence-item"><strong>INTEL:</strong> ' + text + '</div>').join("") || '<div class="evidence-item"><strong>STATUS:</strong> 尚未使用調查點數深入查核。</div>') +
    '</div><div class="actions">' +
    '<button class="btn btn-secondary" onclick="investigateRestaurant()" ' + (state.l4InvestigationsLeft <= 0 || revealedCount >= r.reveals.length ? "disabled" : "") + '>INVESTIGATE (-1 pt)</button>' +
    '<button class="btn btn-gold" onclick="confirmRestaurant()">CONFIRM CHOICE</button></div>';
}

function investigateRestaurant() {
  const mission = missions[state.l4MissionIndex];
  const r = mission.restaurants.find(item => item.name === state.l4SelectedRestaurant);
  if (!r || state.l4InvestigationsLeft <= 0) return;
  const revealedCount = state.l4Completed.filter(item => item.mission === state.l4MissionIndex && item.restaurant === r.name).length;
  if (revealedCount >= r.reveals.length) return;
  state.l4Completed.push({ mission: state.l4MissionIndex, restaurant: r.name, reveal: revealedCount });
  state.l4InvestigationsLeft -= 1;
  state.l4PendingNews = null;
  renderLevel4();
}

function confirmRestaurant() {
  const mission = missions[state.l4MissionIndex];
  const selected = mission.restaurants.find(item => item.name === state.l4SelectedRestaurant);
  if (!selected) return;
  const correct = selected.name === mission.best;
  const base = correct ? 26 : (selected.score >= 26 ? 16 : 0);
  const bonus = correct ? getSpeedBonus() : 0;
  if (base > 0) addScore(4, base + bonus);
  if (correct) {
    showScorePopup(base, bonus);
    showDramaticText("OPTIMAL CHOICE", "success");
  } else {
    triggerShake();
    showDramaticText("SUBOPTIMAL", "fail");
  }
  const scoreHtml = correct ? '<div class="score-earned">+' + base + ' BASE' + (bonus > 0 ? ' <span class="speed-glow">+' + bonus + ' SPEED</span>' : '') + '</div>' : '';
  const panel = document.querySelector(".mission-panel");
  panel.innerHTML = '<div class="feedback-card ' + (correct ? "good" : "bad") + '">' + scoreHtml +
    '<div class="feedback-title">' + (correct ? "✓ 決策正確" : "✗ 決策待改進") + '</div>' +
    '<p>' + mission.explanation + '</p><p><strong>你的選擇：</strong>' + selected.name + '</p><p><strong>最佳選擇：</strong>' + mission.best + '</p></div>' +
    '<div class="actions"><button class="btn btn-primary" onclick="nextMission4()">' + (state.l4MissionIndex === missions.length - 1 ? "COMPLETE LEVEL 4" : "NEXT DECISION →") + '</button></div>';
}

function nextMission4() {
  if (state.l4MissionIndex < missions.length - 1) {
    state.l4MissionIndex += 1;
    state.l4InvestigationsLeft = 3;
    state.l4SelectedRestaurant = null;
    state.l4PendingNews = missions[state.l4MissionIndex].newsFlash;
    renderLevel4();
    return;
  }
  if (state.levelScores[4] >= 60) awardBadge("decision");
  completeLevel(4, 16, null);
  showDramaticText("MISSION CLEARED", "clear");
  renderLevelComplete(4, "LEVEL 4 COMPLETE", "決策模擬完成。最終關卡：綜合認證考試。",
    [`本關得分：${state.levelScores[4]}`, "通過考試即可獲得認證證書。"],
    "PROCEED TO FINAL EXAM", () => startMission(5));
}

          <div class="certificate-sub" style="font-size:18px; margin-top:4px;">${state.studentClass || "未分班"}</div>
          <p style="text-align:center; line-height:1.9;">
            ${passed ? "已完成外食稽查總署五階段高強度特訓，通過綜合認證考試，具備餐廳現場稽查、食品標示判讀、溫度風險管理與外食決策能力。特此認證。" : "已完成外食稽查總署培訓流程。建議針對薄弱環節再次挑戰，強化溫控判斷、標示鑑定與綜合決策能力後重新應考。"}
          </p>
          <div class="certificate-grid">
            <div class="certificate-cell">
              <div class="small">TOTAL SCORE</div>
              <div class="stat-value">${state.totalScore}</div>
            </div>
            <div class="certificate-cell">
              <div class="small">EXAM SCORE</div>
              <div class="stat-value">${state.levelScores[5]}</div>
            </div>
            <div class="certificate-cell">
              <div class="small">RANK</div>
              <div class="stat-value" style="font-size:18px;">${passed ? "合格外食稽查員" : state.rank}</div>
            </div>
          </div>
          <div class="certificate-footer">CERTIFIED ${getToday()}</div>
        </div>
        <div class="panel" style="margin-top:18px;">
          <h3 class="section-title">SCORE BREAKDOWN</h3>
          <div class="feedback-list">
            <div class="feedback-item"><strong>LEVEL 1：</strong>${state.levelScores[1]} pts</div>
            <div class="feedback-item"><strong>LEVEL 2：</strong>${state.levelScores[2]} pts</div>
            <div class="feedback-item"><strong>LEVEL 3：</strong>${state.levelScores[3]} pts</div>
            <div class="feedback-item"><strong>LEVEL 4：</strong>${state.levelScores[4]} pts</div>
            <div class="feedback-item"><strong>LEVEL 5：</strong>${state.levelScores[5]} pts</div>
          </div>
          <div class="actions">
            <button class="btn btn-gold" onclick="goHome()">RETURN TO HQ</button>
            <button class="btn btn-secondary" onclick="startMission(5)">RETAKE EXAM</button>
          </div>
        </div>
      </div>
    </section>
  `);
}

function renderLevelComplete(level, title, desc, bullets, ctaLabel, ctaAction) {
  renderApp(`
    <section class="screen">
      <div class="container">
        ${renderNav()}
        <div class="panel" style="max-width:760px; margin:0 auto;">
          <h2 class="mission-title">${title}</h2>
          <p class="mission-desc">${desc}</p>
          <div class="feedback-list" style="margin-top:18px;">
            ${bullets.map(text => '<div class="feedback-item">' + text + '</div>').join("")}
          </div>
          <div class="actions">
            <button class="btn btn-primary" onclick="levelCompleteNext()">${ctaLabel}</button>
            <button class="btn btn-secondary" onclick="goHome()">RETURN TO HQ</button>
          </div>
        </div>
      </div>
    </section>
  `);
  window.levelCompleteNext = ctaAction;
}

renderHome();

document.getElementById("app").addEventListener("click", (event) => {
  const target = event.target.closest("[data-action]");
  if (!target || target.disabled) return;
  runAction(target.getAttribute("data-action"));
});
</script>
</body>
</html>
